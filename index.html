<!DOCTYPE html>
<html>

<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>endziu.xyz - a home page - Andrzej Koper</title>
  <style type="text/css">
    * {
      margin: 0;
      padding: 0;
    }

    body {
      background: #001000;
      margin: 0;
      overflow: hidden;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif, "Apple Color Emoji", "Segoe UI Emoji", "Segoe UI Symbol";
    }

    a {
      color: #fff;
      text-decoration: none;
    }

    a:hover {
      color: #000;
      background-color: #fff;
    }

    #title {
      position: fixed;
      top: 20px;
      left: 20px;
      margin: 0;
      color: #fff;
      font-size: 36px;
    }

    #canvas {
      z-index: -1;
      width: 100%;
      height: 100%;
    }

    .controls {
      position: fixed;
      top: 20px;
      right: 20px;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .controls select,
    .controls button {
      background: transparent;
      border: 1px solid #fff;
      color: #fff;
      padding: 6px 14px;
      font-size: 14px;
      cursor: pointer;
    }

    .controls select:hover,
    .controls button:hover {
      background: #fff;
      color: #000;
    }
  </style>
</head>

<body>
  <h1 id="title">
    <a href="/projects.html">endziu.xyz</a>
  </h1>

  <div class="controls">
    <button id="reset">reset</button>
    <button id="save-layout">save layout</button>
    <button id="rename-layout">rename layout</button>
    <button id="import-layouts">import layouts</button>
    <button id="export-layouts">export layouts</button>
    <button id="remove-layout">remove layout</button>
    <button id="clear-gravity">clear gravity</button>
    <button id="toggle-gravity">debug</button>
    <select id="layout"></select>
  </div>
  <canvas id="canvas"></canvas>

  <script type="module" src="/js/app.js"></script>
</body>

</html>
