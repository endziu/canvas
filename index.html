<!DOCTYPE html>
<html>

<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>endziu.xyz - a home page - Andrzej Koper</title>
  <style type="text/css">
    * {
      margin: 0;
      padding: 0;
    }

    body {
      background: #001000;
      margin: 0;
      overflow: hidden;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif, "Apple Color Emoji", "Segoe UI Emoji", "Segoe UI Symbol";
    }

    a {
      color: #fff;
      text-decoration: none;
    }

    a:hover {
      color: #000;
      background-color: #fff;
    }

    #title {
      position: fixed;
      top: 20px;
      left: 20px;
      margin: 0;
      color: #fff;
      font-size: 36px;
    }

    #canvas {
      z-index: -1;
      width: 100%;
      height: 100%;
    }

    #reset, #toggle-gravity {
      position: fixed;
      top: 20px;
      background: transparent;
      border: 1px solid #fff;
      color: #fff;
      padding: 6px 14px;
      font-size: 14px;
      cursor: pointer;
    }

    #reset { right: 20px; }
    #toggle-gravity { right: 90px; }

    #reset:hover, #toggle-gravity:hover {
      background: #fff;
      color: #000;
    }
  </style>
</head>

<body>
  <h1 id="title">
    <a href="/projects.html">endziu.xyz</a>
  </h1>

  <button id="toggle-gravity">hide gravity</button>
  <button id="reset">reset</button>
  <canvas id="canvas"></canvas>

  <script type="module" src="/js/app.js"></script>
</body>

</html>
